name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax / imports
        run: |
          python -m py_compile main.py analyzer/*.py

      - name: Lint with flake8 (basic checks only)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Build Docker image
        run: |
          docker build -t novapay-ci-doctor:test .

      - name: Run tool against sample log (dry check, no real API call)
        run: |
          echo "Skipping live run — requires ANTHROPIC_API_KEY secret."
          echo "To enable full run, add ANTHROPIC_API_KEY in repo Settings > Secrets and uncomment below."